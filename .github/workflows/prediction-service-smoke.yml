name: prediction-service-smoke

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: test -d services/prediction-api || exit 0
      - run: test -f services/prediction-api/requirements.txt && pip install -r services/prediction-api/requirements.txt || true
      - run: test -f services/prediction-api/smoke_test.py && python services/prediction-api/smoke_test.py || true
