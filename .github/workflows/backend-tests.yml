name: backend-tests

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: test -d app/backend || exit 0
      - run: test -f app/backend/requirements.txt && pip install -r app/backend/requirements.txt || true
      - run: pytest tests/unit tests/integration tests/api || true
