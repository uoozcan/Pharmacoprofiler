name: frontend-tests

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('app/frontend/package.json') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd app/frontend && npm ci
      - run: cd app/frontend && npm test -- --runInBand
